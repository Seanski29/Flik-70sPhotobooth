<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FLIK - Controls</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rye&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="app-layout">
    <div id="sidebar-container"></div>
    <main class="workspace">
        <header class="workspace-header">
            <div>
                <h2 class="page-title">Control</h2>
                <p class="page-subtitle">Manual Overrides</p>
            </div>
        </header>
        <section class="panel" style="display: flex; gap: 20px;">
            <button class="btn-primary" style="width: 250px;">Test Fire Camera</button>
            <button class="btn-primary" style="width: 250px;">Test Print Spool</button>
            <button class="btn-primary" style="width: 250px; background-color: var(--text-dark);">Reset System</button>
        </section>
    </main>
    <script src="../js/sidebar.js"></script>
</body>
</html>
